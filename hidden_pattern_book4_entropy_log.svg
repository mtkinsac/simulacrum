<svg width="680" height="1020" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
<title>Codex of the Gods book cover</title>
<desc>Cover for Book Three showing three deity symbols across pantheons: the Egyptian Eye of Horus, the Greek thunderbolt of Zeus, and the Norse triquetra knot, arranged in a triangle to suggest the same divine archetype across cultures.</desc>
<defs>
<linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#030812"/>
<stop offset="50%" stop-color="#0B1B2E"/>
<stop offset="100%" stop-color="#050A14"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="680" height="1020" fill="url(#bg3)"/>

<!-- Starfield -->
<circle cx="55" cy="180" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="130" cy="240" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="340" cy="200" r="1" fill="#F5E6D0" opacity="0.7"/>
<circle cx="380" cy="150" r="0.8" fill="#F5E6D0" opacity="0.6"/>
<circle cx="620" cy="280" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="45" cy="400" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="325" cy="440" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="360" cy="480" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="640" cy="460" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="55" cy="620" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="580" cy="620" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="150" cy="680" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="530" cy="680" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="50" cy="760" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="610" cy="760" r="0.9" fill="#F5E6D0" opacity="0.6"/>

<!-- Series branding -->
<line x1="180" y1="75" x2="295" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<line x1="385" y1="75" x2="500" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<text x="340" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#B8966D" letter-spacing="7" font-weight="400">THE HIDDEN PATTERN</text>
<text x="340" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="8" font-weight="400">— BOOK THREE —</text>

<!-- Connecting paths - triangular arrangement -->
<path d="M 295 270 Q 340 260, 385 270" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<path d="M 445 340 Q 420 470, 400 600" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<path d="M 235 340 Q 260 470, 280 600" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<circle cx="340" cy="262" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="430" cy="470" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="250" cy="470" r="2" fill="#B8966D" opacity="0.7"/>

<!-- CIRCLE 1: Eye of Horus (top-left) -->
<circle cx="210" cy="245" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="210" cy="245" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>

<!-- Eye of Horus -->
<g fill="#050810">
  <path d="M 165 222 Q 210 212, 255 222 L 257 230 Q 210 220, 163 230 Z"/>
  <path d="M 168 248 Q 210 230, 252 248 Q 248 255, 210 258 Q 172 255, 168 248 Z"/>
  <path d="M 172 258 Q 210 268, 248 258 L 250 262 Q 210 272, 170 262 Z"/>
  <circle cx="210" cy="250" r="7"/>
  <path d="M 208 272 L 206 298 L 210 302 L 214 298 L 212 272 Z"/>
  <path d="M 235 268 Q 250 280, 258 300 L 262 295 Q 253 278, 240 262 Z"/>
</g>

<text x="210" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">HORUS</text>
<text x="210" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Egypt</text>

<!-- CIRCLE 2: Thunderbolt (top-right) -->
<circle cx="470" cy="245" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="470" cy="245" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>

<!-- Thunderbolt -->
<g fill="#050810">
  <path d="M 480 190 L 500 235 L 478 242 L 498 300 L 458 260 L 480 252 L 460 200 Z"/>
  <path d="M 458 195 L 472 210 L 465 212 L 450 205 Z"/>
  <path d="M 500 295 L 510 305 L 495 308 L 490 298 Z"/>
</g>

<text x="470" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">ZEUS</text>
<text x="470" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Greece</text>

<!-- CIRCLE 3: Triquetra (bottom-center) -->
<circle cx="340" cy="665" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="340" cy="665" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>

<!-- Triquetra -->
<g fill="none" stroke="#050810" stroke-width="3" stroke-linejoin="round">
  <path d="M 310 670 Q 340 610, 370 670 Q 340 640, 310 670 Z"/>
  <path d="M 325 635 Q 290 700, 340 705 Q 320 675, 325 635 Z"/>
  <path d="M 355 635 Q 390 700, 340 705 Q 360 675, 355 635 Z"/>
</g>
<circle cx="340" cy="670" r="42" fill="none" stroke="#050810" stroke-width="1.5" opacity="0.6"/>

<text x="340" y="795" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">ODIN</text>
<text x="340" y="813" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Scandinavia</text>

<!-- Title block -->
<line x1="80" y1="840" x2="600" y2="840" stroke="#B8966D" stroke-width="0.5" opacity="0.3"/>
<text x="340" y="900" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">CODEX OF</text>
<text x="340" y="965" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">THE GODS</text>
<line x1="240" y1="985" x2="440" y2="985" stroke="#B8966D" stroke-width="0.5" opacity="0.6"/>
<text x="340" y="1008" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#B8966D" letter-spacing="6" font-weight="400">MICHAEL KNIGHT</text>

</svg>
