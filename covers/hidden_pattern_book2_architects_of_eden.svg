<svg width="680" height="1020" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
<title>Architects of Eden book cover</title>
<desc>Cover for Book Two of The Hidden Pattern showing the Eridu ziggurat, the Tree of Life, and the Ur ziggurat connected by a threading path.</desc>
<defs>
<linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#030812"/>
<stop offset="50%" stop-color="#0B1B2E"/>
<stop offset="100%" stop-color="#050A14"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="680" height="1020" fill="url(#bg2)"/>

<!-- Starfield -->
<circle cx="55" cy="180" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="130" cy="240" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="220" cy="190" r="1" fill="#F5E6D0" opacity="0.7"/>
<circle cx="300" cy="150" r="0.8" fill="#F5E6D0" opacity="0.6"/>
<circle cx="620" cy="280" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="45" cy="400" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="600" cy="400" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="640" cy="550" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="380" cy="480" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="55" cy="620" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="350" cy="580" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="580" cy="680" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="50" cy="760" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="380" cy="760" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="330" cy="680" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="550" cy="790" r="0.8" fill="#F5E6D0" opacity="0.55"/>

<!-- Series branding -->
<line x1="180" y1="75" x2="295" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<line x1="385" y1="75" x2="500" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<text x="340" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#B8966D" letter-spacing="7" font-weight="400">THE HIDDEN PATTERN</text>
<text x="340" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="8" font-weight="400">— BOOK TWO —</text>

<!-- Connecting path -->
<path d="M 405 310 Q 330 380, 255 410" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<path d="M 275 540 Q 355 590, 450 620" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<circle cx="370" cy="340" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="310" cy="395" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="320" cy="570" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="395" cy="600" r="2" fill="#B8966D" opacity="0.7"/>

<!-- CIRCLE 1: Eridu Ziggurat (top-right) -->
<circle cx="470" cy="245" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="470" cy="245" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 380 245 A 90 90 0 0 0 560 245 Z" fill="#3A2414"/>

<!-- Stepped ziggurat (Eridu) - 3 tiers -->
<g fill="#050810">
  <rect x="425" y="275" width="90" height="14"/>
  <rect x="438" y="256" width="64" height="16"/>
  <rect x="451" y="238" width="38" height="15"/>
  <rect x="460" y="225" width="20" height="10"/>
  <rect x="465" y="215" width="10" height="8"/>
</g>
<ellipse cx="470" cy="291" rx="55" ry="2.5" fill="#050810" opacity="0.6"/>

<text x="470" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">ERIDU</text>
<text x="470" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">c. 5400 BCE</text>

<!-- CIRCLE 2: Tree of Life (middle-left) -->
<circle cx="210" cy="465" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="210" cy="465" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 120 465 A 90 90 0 0 0 300 465 Z" fill="#3A2414"/>

<!-- Tree of Life silhouette -->
<g fill="#050810">
  <rect x="206" y="450" width="8" height="62"/>
  <path d="M 196 510 Q 210 505, 224 510 L 226 515 Q 210 508, 194 515 Z"/>
  <ellipse cx="210" cy="420" rx="48" ry="28"/>
  <ellipse cx="182" cy="430" rx="24" ry="20"/>
  <ellipse cx="238" cy="430" rx="24" ry="20"/>
  <ellipse cx="210" cy="400" rx="38" ry="22"/>
</g>
<path d="M 214 510 Q 222 500, 215 490 Q 208 480, 216 470 Q 224 460, 218 450" fill="none" stroke="#050810" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="190" cy="415" r="2" fill="#7A3820" opacity="0.85"/>
<circle cx="225" cy="405" r="2" fill="#7A3820" opacity="0.85"/>
<circle cx="215" cy="430" r="2" fill="#7A3820" opacity="0.85"/>
<circle cx="195" cy="440" r="2" fill="#7A3820" opacity="0.85"/>
<ellipse cx="210" cy="515" rx="55" ry="2.5" fill="#050810" opacity="0.6"/>

<text x="210" y="590" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">TREE OF LIFE</text>
<text x="210" y="608" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">mythic time</text>

<!-- CIRCLE 3: Ur Ziggurat (bottom-right) -->
<circle cx="470" cy="670" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="470" cy="670" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 380 670 A 90 90 0 0 0 560 670 Z" fill="#3A2414"/>

<!-- Ziggurat of Ur -->
<g fill="#050810">
  <rect x="415" y="700" width="110" height="16"/>
  <rect x="430" y="680" width="80" height="20"/>
  <rect x="446" y="660" width="48" height="20"/>
  <rect x="456" y="646" width="28" height="14"/>
</g>
<line x1="460" y1="716" x2="460" y2="646" stroke="#1A1008" stroke-width="0.5" opacity="0.6"/>
<line x1="480" y1="716" x2="480" y2="646" stroke="#1A1008" stroke-width="0.5" opacity="0.6"/>
<ellipse cx="470" cy="720" rx="62" ry="2.5" fill="#050810" opacity="0.6"/>

<text x="470" y="795" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#B8966D" letter-spacing="4" font-weight="400">UR</text>
<text x="470" y="813" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">c. 2100 BCE</text>

<!-- Title block -->
<line x1="80" y1="840" x2="600" y2="840" stroke="#B8966D" stroke-width="0.5" opacity="0.3"/>
<text x="340" y="900" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">ARCHITECTS</text>
<text x="340" y="965" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">OF EDEN</text>
<line x1="240" y1="985" x2="440" y2="985" stroke="#B8966D" stroke-width="0.5" opacity="0.6"/>
<text x="340" y="1008" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#B8966D" letter-spacing="6" font-weight="400">MICHAEL KNIGHT</text>

</svg>
