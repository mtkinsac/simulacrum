<svg width="680" height="1020" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
<title>The Entropy Log book cover</title>
<desc>Cover for Book Four showing Giza as the source at the top with deployments outward to Göbekli Tepe in the east and Stonehenge in the west, arguing the pre-Younger-Dryas civilization thesis.</desc>
<defs>
<linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#030812"/>
<stop offset="50%" stop-color="#0B1B2E"/>
<stop offset="100%" stop-color="#050A14"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="680" height="1020" fill="url(#bg4)"/>

<!-- Starfield -->
<circle cx="55" cy="180" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="130" cy="240" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="215" cy="190" r="1" fill="#F5E6D0" opacity="0.7"/>
<circle cx="470" cy="180" r="0.8" fill="#F5E6D0" opacity="0.6"/>
<circle cx="555" cy="230" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="620" cy="260" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="45" cy="400" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="340" cy="440" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="390" cy="490" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="640" cy="460" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="55" cy="600" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="320" cy="620" r="0.7" fill="#F5E6D0" opacity="0.5"/>
<circle cx="380" cy="580" r="0.8" fill="#F5E6D0" opacity="0.55"/>
<circle cx="640" cy="600" r="0.9" fill="#F5E6D0" opacity="0.6"/>
<circle cx="340" cy="680" r="0.6" fill="#F5E6D0" opacity="0.5"/>
<circle cx="350" cy="780" r="0.9" fill="#F5E6D0" opacity="0.6"/>

<!-- Series branding -->
<line x1="180" y1="75" x2="295" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<line x1="385" y1="75" x2="500" y2="75" stroke="#B8966D" stroke-width="0.6" opacity="0.7"/>
<text x="340" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#B8966D" letter-spacing="7" font-weight="400">THE HIDDEN PATTERN</text>
<text x="340" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="8" font-weight="400">— BOOK FOUR —</text>

<!-- Connecting paths -->
<path d="M 270 310 Q 220 450, 200 600" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<path d="M 410 310 Q 460 450, 480 600" fill="none" stroke="#8B7355" stroke-width="1.2" stroke-dasharray="4 5" opacity="0.85"/>
<circle cx="232" cy="435" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="208" cy="525" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="448" cy="435" r="2" fill="#B8966D" opacity="0.7"/>
<circle cx="472" cy="525" r="2" fill="#B8966D" opacity="0.7"/>

<!-- CIRCLE 1: Giza - Sphinx + Pyramid (top-center) -->
<circle cx="340" cy="245" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="340" cy="245" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 250 245 A 90 90 0 0 0 430 245 Z" fill="#3A2414"/>

<!-- Pyramid in background -->
<polygon points="290 275 340 195 390 275" fill="#060B14"/>
<polygon points="340 195 390 275 365 275" fill="#080D17"/>

<!-- Sphinx in foreground -->
<g fill="#050810">
  <ellipse cx="345" cy="280" rx="38" ry="10"/>
  <rect x="360" y="280" width="18" height="15"/>
  <rect x="378" y="280" width="5" height="15"/>
  <circle cx="378" cy="268" r="8"/>
  <path d="M 376 260 L 390 262 L 392 278 L 376 276 Z"/>
  <path d="M 378 276 L 376 284 L 380 284 Z"/>
</g>
<ellipse cx="345" cy="297" rx="55" ry="2" fill="#050810" opacity="0.5"/>

<text x="340" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#B8966D" letter-spacing="5" font-weight="500">THE SOURCE</text>
<text x="340" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Giza, Egypt</text>

<!-- CIRCLE 2: Göbekli Tepe (bottom-left) -->
<circle cx="200" cy="670" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="200" cy="670" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 110 670 A 90 90 0 0 0 290 670 Z" fill="#3A2414"/>

<!-- Göbekli Tepe T-pillars -->
<g fill="#050810">
  <rect x="159" y="675" width="6" height="26"/>
  <rect x="151" y="671" width="22" height="6"/>
  <rect x="194" y="655" width="12" height="50"/>
  <rect x="178" y="646" width="44" height="11"/>
  <rect x="235" y="670" width="8" height="32"/>
  <rect x="225" y="664" width="28" height="8"/>
</g>
<ellipse cx="200" cy="705" rx="55" ry="2.5" fill="#050810" opacity="0.6"/>

<text x="200" y="795" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#B8966D" letter-spacing="5" font-weight="500">THE EAST</text>
<text x="200" y="813" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Göbekli Tepe</text>

<!-- CIRCLE 3: Stonehenge (bottom-right) -->
<circle cx="480" cy="670" r="95" fill="none" stroke="#B8966D" stroke-width="0.6" opacity="0.5"/>
<circle cx="480" cy="670" r="90" fill="#2C1E10" stroke="#B8966D" stroke-width="1.5"/>
<path d="M 390 670 A 90 90 0 0 0 570 670 Z" fill="#3A2414"/>

<!-- Stonehenge trilithons -->
<g fill="#050810">
  <rect x="455" y="655" width="15" height="50"/>
  <rect x="495" y="655" width="15" height="50"/>
  <rect x="450" y="643" width="65" height="14"/>
  <rect x="420" y="668" width="11" height="38"/>
  <rect x="445" y="668" width="11" height="38"/>
  <rect x="417" y="658" width="42" height="11"/>
  <rect x="524" y="668" width="11" height="38"/>
  <rect x="549" y="668" width="11" height="38"/>
  <rect x="521" y="658" width="42" height="11"/>
</g>
<ellipse cx="480" cy="707" rx="75" ry="2.5" fill="#050810" opacity="0.6"/>

<text x="480" y="795" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#B8966D" letter-spacing="5" font-weight="500">THE WEST</text>
<text x="480" y="813" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355" letter-spacing="3" font-style="italic">Stonehenge</text>

<!-- Title block -->
<line x1="80" y1="840" x2="600" y2="840" stroke="#B8966D" stroke-width="0.5" opacity="0.3"/>
<text x="340" y="900" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">THE ENTROPY</text>
<text x="340" y="965" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#F5E6D0" font-weight="700" letter-spacing="2">LOG</text>
<line x1="240" y1="985" x2="440" y2="985" stroke="#B8966D" stroke-width="0.5" opacity="0.6"/>
<text x="340" y="1008" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#B8966D" letter-spacing="6" font-weight="400">MICHAEL KNIGHT</text>

</svg>
